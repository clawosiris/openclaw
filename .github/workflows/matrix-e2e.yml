name: Matrix E2E Tests

on:
  workflow_dispatch:
    inputs:
      debug:
        description: 'Enable debug logging'
        required: false
        default: 'false'
        type: boolean
  schedule:
    # Run nightly at 4am UTC
    - cron: '0 4 * * *'
  # Also allow triggering from PR comments or labels if desired
  pull_request:
    paths:
      - 'extensions/matrix/**'
      - 'vitest.matrix-e2e.config.ts'
    types: [labeled]

jobs:
  matrix-e2e:
    name: Matrix Thread Bindings E2E
    runs-on: ubuntu-latest
    # Only run on PRs if 'run-matrix-e2e' label is added
    if: github.event_name != 'pull_request' || contains(github.event.pull_request.labels.*.name, 'run-matrix-e2e')
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 8

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Start Matrix homeserver
        run: |
          docker compose -f extensions/matrix/tests/e2e/docker-compose.matrix.yml up -d
          # Wait for Synapse to be ready
          timeout 60 bash -c 'until curl -sf http://localhost:8008/_matrix/client/versions; do sleep 2; done'

      - name: Run Matrix E2E tests
        run: pnpm vitest run --config vitest.matrix-e2e.config.ts
        env:
          MATRIX_E2E: 'true'
          MATRIX_E2E_HOMESERVER: 'http://localhost:8008'

      - name: Stop Matrix homeserver
        if: always()
        run: docker compose -f extensions/matrix/tests/e2e/docker-compose.matrix.yml down -v

      - name: Upload test results
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: matrix-e2e-results
          path: |
            extensions/matrix/tests/e2e/logs/
          retention-days: 7
